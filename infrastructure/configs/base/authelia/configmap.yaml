apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yml: |
    theme: dark

    server:
      host: 0.0.0.0
      port: 9091

    log:
      level: debug

    totp:
      issuer: sebastien.sh
      period: 30
      skew: 1

    authentication_backend:
      password_reset:
        disable: false
      refresh_interval: 5m
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2
          argon2:
            variant: argon2id
            iterations: 3
            memory: 65536
            parallelism: 4
            key_length: 32
            salt_length: 16

    access_control:
      default_policy: deny
      rules:
        # Public services - no auth required
        - domain:
            - cv.sebastien.sh
            - api.sebastien.sh
            - auth.sebastien.sh
          policy: bypass
        # Grafana public dashboards - no auth required
        - domain:
            - grafana.sebastien.sh
          resources:
            - "^/public-dashboards/.*$"
          policy: bypass
        # High-security services - require 2FA (admins group)
        - domain:
            - akhq.sebastien.sh
            - grafana.sebastien.sh
            - prometheus.sebastien.sh
          subject:
            - ["group:admins"]
          policy: two_factor
        # Other protected services - require password only (admins group)
        - domain:
            - "*.sebastien.sh"
          subject:
            - ["group:admins"]
          policy: one_factor

    session:
      name: authelia_session
      same_site: lax
      cookies:
        - domain: sebastien.sh
          authelia_url: https://auth.sebastien.sh
          default_redirection_url: https://cv.sebastien.sh
      expiration: 7d
      inactivity: 2h
      remember_me: 90d

    regulation:
      max_retries: 5
      find_time: 5m
      ban_time: 12h

    storage:
      local:
        path: /data/db.sqlite3

    notifier:
      filesystem:
        filename: /data/notification.txt
