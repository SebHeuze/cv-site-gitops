---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # External Vault running on Proxmox VM
      # Update this to your Vault VM IP address
      server: "http://vault.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        # Using token auth for external Vault
        # The token is stored in a Kubernetes secret
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets
---
# Bootstrap secret for Vault token
# This must be created manually before External Secrets can work:
# kubectl create secret generic vault-token -n external-secrets --from-literal=token=<your-vault-token>
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: external-secrets
type: Opaque
stringData:
  # PLACEHOLDER - Replace with actual token or create manually
  token: "REPLACE_ME_WITH_VAULT_TOKEN"
