---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # External Vault running on Proxmox VM
      # Update this to your Vault VM IP address
      server: "https://vault.internal:8200"
      path: "secret"
      version: "v2"
      # Trust self-signed certificate
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
        namespace: external-secrets
      auth:
        # Using token auth for external Vault
        # The token is stored in a Kubernetes secret
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets
# Bootstrap secret for Vault token must be created manually:
# kubectl create secret generic vault-token -n external-secrets --from-literal=token=<your-vault-token>
