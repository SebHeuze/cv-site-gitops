apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - traefik/ingressroutes.yaml
patches:
  # Update Authelia middleware for local domain
  - target:
      kind: Middleware
      name: authelia
    patch: |
      - op: replace
        path: /spec/forwardAuth/address
        value: http://authelia.authelia.svc.cluster.local:9091/api/verify?rd=https://auth.k8s.local
  # Disable STS preload for local (self-signed certs)
  - target:
      kind: Middleware
      name: security-headers
    patch: |
      - op: replace
        path: /spec/headers/stsPreload
        value: false
      - op: replace
        path: /spec/headers/frameDeny
        value: false
  # Update Authelia config for local domain
  - target:
      kind: ConfigMap
      name: authelia-config
    patch: |
      - op: replace
        path: /data/configuration.yml
        value: |
          theme: light
          default_redirection_url: https://cv.k8s.local

          server:
            host: 0.0.0.0
            port: 9091

          log:
            level: debug

          totp:
            issuer: k8s.local
            period: 30
            skew: 1

          authentication_backend:
            file:
              path: /config/users_database.yml

          access_control:
            default_policy: deny
            rules:
              - domain: cv.k8s.local
                policy: bypass
              - domain: api.k8s.local
                policy: bypass
              - domain: auth.k8s.local
                policy: bypass
              - domain: grafana.k8s.local
                policy: one_factor
              - domain: akhq.k8s.local
                policy: one_factor
              - domain: prometheus.k8s.local
                policy: one_factor
              - domain: traefik.k8s.local
                policy: one_factor

          session:
            name: authelia_session
            domain: k8s.local
            expiration: 3600
            inactivity: 300
            remember_me_duration: 1M

          regulation:
            max_retries: 3
            find_time: 120
            ban_time: 300

          storage:
            local:
              path: /data/db.sqlite3

          notifier:
            filesystem:
              filename: /data/notification.txt
