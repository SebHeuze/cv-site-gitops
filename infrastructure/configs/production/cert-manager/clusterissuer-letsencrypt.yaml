---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@sebastien.sh
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.cert-manager.io
            solverName: ovh
            config:
              endpoint: ovh-eu
              applicationSecretRef:
                name: ovh-credentials
                key: applicationSecret
              applicationKeyRef:
                name: ovh-credentials
                key: applicationKey
              consumerKeyRef:
                name: ovh-credentials
                key: consumerKey
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@sebastien.sh
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.cert-manager.io
            solverName: ovh
            config:
              endpoint: ovh-eu
              applicationSecretRef:
                name: ovh-credentials
                key: applicationSecret
              applicationKeyRef:
                name: ovh-credentials
                key: applicationKey
              consumerKeyRef:
                name: ovh-credentials
                key: consumerKey
