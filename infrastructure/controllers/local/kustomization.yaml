apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  # Reduce Traefik replicas for local
  - target:
      kind: HelmRelease
      name: traefik
    patch: |
      - op: replace
        path: /spec/values/deployment/replicas
        value: 1
  # Reduce Vault storage for local
  - target:
      kind: HelmRelease
      name: vault
    patch: |
      - op: replace
        path: /spec/values/server/dataStorage/size
        value: 1Gi
