apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  # Reduce Prometheus storage and resources for local
  - target:
      kind: HelmRelease
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/storageSpec/volumeClaimTemplate/spec/resources/requests/storage
        value: 10Gi
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/retention
        value: 7d
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/resources/limits/cpu
        value: 500m
  # Reduce Grafana storage for local
  - target:
      kind: HelmRelease
      name: grafana
    patch: |
      - op: replace
        path: /spec/values/persistence/size
        value: 2Gi
      - op: replace
        path: /spec/values/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/values/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/values/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/values/resources/limits/cpu
        value: 250m
