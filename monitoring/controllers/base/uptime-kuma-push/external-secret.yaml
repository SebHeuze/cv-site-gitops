---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uptime-kuma-push
  namespace: monitoring-prd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: uptime-kuma-push
    creationPolicy: Owner
  data:
    - secretKey: push-url
      remoteRef:
        key: secret/cv-site/uptime-kuma
        property: push-url
