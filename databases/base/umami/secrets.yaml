---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-postgres-credentials
  namespace: monitoring-prd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: umami-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/cv-site/umami-postgres
        property: username
    - secretKey: password
      remoteRef:
        key: secret/cv-site/umami-postgres
        property: password
