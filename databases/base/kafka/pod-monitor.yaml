apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-exporter
  namespace: kafka-prd
spec:
  selector:
    matchLabels:
      strimzi.io/cluster: cv-kafka-cluster
      strimzi.io/component-type: kafka-exporter
  podMetricsEndpoints:
    - port: tcp-prometheus
      path: /metrics
