---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-database-url
  namespace: monitoring-prd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: umami-database-url
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        url: "postgresql://{{ .username }}:{{ .password | urlquery }}@umami-db.monitoring-prd.svc.cluster.local:5432/umami"
  data:
    - secretKey: username
      remoteRef:
        key: secret/cv-site/umami-postgres
        property: username
    - secretKey: password
      remoteRef:
        key: secret/cv-site/umami-postgres
        property: password
