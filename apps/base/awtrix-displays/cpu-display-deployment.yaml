apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-display
  namespace: homelab-prd
  labels:
    app: cpu-display
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cpu-display
  template:
    metadata:
      labels:
        app: cpu-display
    spec:
      containers:
        - name: cpu-display
          image: python:3.14-slim
          command: ["sh", "-c"]
          args:
            - "pip install --quiet --no-cache-dir aiohttp && python /app/cpu_display.py"
          envFrom:
            - configMapRef:
                name: awtrix-config
          volumeMounts:
            - name: scripts
              mountPath: /app
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: scripts
          configMap:
            name: awtrix-scripts
