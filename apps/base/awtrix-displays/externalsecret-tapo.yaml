apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: awtrix-tapo-credentials
  namespace: homelab-prd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: awtrix-tapo-credentials
    creationPolicy: Owner
  data:
    - secretKey: email
      remoteRef:
        key: secret/cv-site/awtrix-tapo
        property: email
    - secretKey: password
      remoteRef:
        key: secret/cv-site/awtrix-tapo
        property: password
