apiVersion: batch/v1
kind: Job
metadata:
  name: awtrix-setup
  namespace: homelab-prd
  labels:
    app: awtrix-setup
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: awtrix-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: awtrix-setup
          image: python:3.14-slim
          command: ["sh", "-c"]
          args:
            - "pip install --quiet --no-cache-dir aiohttp && python /app/awtrix_setup.py"
          envFrom:
            - configMapRef:
                name: awtrix-config
          volumeMounts:
            - name: scripts
              mountPath: /app
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: scripts
          configMap:
            name: awtrix-scripts
